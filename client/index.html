<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCCONTROL</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h1>PC Control</h1>
  <input type="password" id="pin" placeholder="Enter PIN">
  <button onclick="authenticate()">Login</button>
  <div id="controls" style="display:none;">
    <h3>Select Agent</h3>
    <select id="agentSelect"></select>
    
    <h3>Actions</h3>
    <button onclick="sendAction({ type: 'key', value: '{ENTER}' })">Enter</button>
    <button onclick="sendAction({ type: 'key', value: '{BACKSPACE}' })">Backspace</button>
    <button onclick="sendAction({ type: 'key', value: '^c' })">Ctrl+C</button>
    <button onclick="sendAction({ type: 'key', value: '^v' })">Ctrl+V</button>
    <button onclick="sendAction({ type: 'key', value: '{ESC}' })">Esc</button>
    
    <h3>Mouse</h3>
    <div id="touchpad" style="width: 100vw; height: 50vh; background-color: #ddd; margin-top: 10px;">
      Touchpad (Move Mouse Here)
    </div>
  </div>

  <script>
    const socket = io('http://localhost:3000'); // Update with actual server URL
    const touchpad = document.getElementById('touchpad');
    const agentSelect = document.getElementById('agentSelect');

    function updateAgentList(agents) {
      agentSelect.innerHTML = '';
      agents.forEach(([id, name]) => {
        const option = document.createElement('option');
        option.value = id;
        option.textContent = name;
        agentSelect.appendChild(option);
      });
    }

    socket.on('agent_list', updateAgentList);

    touchpad.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const x = Math.floor(touch.clientX * 2); 
      const y = Math.floor(touch.clientY * 2);
      sendAction({ type: 'mouse', x: x, y: y });
    });

    function authenticate() {
      const pin = document.getElementById('pin').value;
      socket.emit('auth', { pin });
    }

    socket.on('auth_result', (data) => {
      if (data.success) {
        document.getElementById('controls').style.display = 'block';
        updateAgentList(data.agents);
        alert('Authenticated!');
      } else {
        alert('Authentication failed: ' + data.message);
      }
    });

    function sendAction(action) {
      action.targetId = agentSelect.value;
      socket.emit('action', action);
    }
  </script>
</body>
</html>
