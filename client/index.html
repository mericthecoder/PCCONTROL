<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCCONTROL</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h1>PC Control</h1>
  <input type="password" id="pin" placeholder="Enter PIN">
  <button onclick="authenticate()">Login</button>
  <div id="controls" style="display:none;">
    <h3>Dashboard</h3>
    <div id="stats" style="border: 1px solid #ccc; padding: 10px;">
        <p>CPU Load: <span id="cpuVal">-</span></p>
        <p>Memory Usage: <span id="memVal">-</span>%</p>
    </div>

    <h3>Select Agent</h3>
    <select id="agentSelect"></select>
    
    <h3>Actions</h3>
    <button onclick="sendAction({ type: 'key', value: '{ENTER}' })">Enter</button>
    <button onclick="sendAction({ type: 'key', value: '{BACKSPACE}' })">Backspace</button>
    <button onclick="sendAction({ type: 'key', value: '^c' })">Ctrl+C</button>
    <button onclick="sendAction({ type: 'key', value: '^v' })">Ctrl+V</button>
    <button onclick="sendAction({ type: 'key', value: '{ESC}' })">Esc</button>

    <h3>Macro Engine</h3>
    <button id="recBtn" onclick="toggleRecord()">Record Macro</button>
    <button id="playBtn" onclick="playMacro()" disabled>Play Macro</button>

    <h3>Mouse</h3>
    <div id="touchpad" style="width: 100vw; height: 50vh; background-color: #ddd; margin-top: 10px;">
      Touchpad (Move Mouse Here)
    </div>
  </div>

  <script>
    const socket = io('http://localhost:3000');
    const touchpad = document.getElementById('touchpad');
    const agentSelect = document.getElementById('agentSelect');
    const recBtn = document.getElementById('recBtn');
    const playBtn = document.getElementById('playBtn');

    let isRecording = false;
    let currentMacro = [];

    function toggleRecord() {
      isRecording = !isRecording;
      if (isRecording) {
        currentMacro = [];
        recBtn.textContent = 'Stop Recording';
        playBtn.disabled = true;
      } else {
        recBtn.textContent = 'Record Macro';
        playBtn.disabled = currentMacro.length === 0;
      }
    }

    function playMacro() {
      if (currentMacro.length > 0) {
        sendAction({ type: 'macro', sequence: currentMacro });
      }
    }

    socket.on('agent_stats', (data) => {
        if(agentSelect.value === data.agentId) {
            document.getElementById('cpuVal').textContent = data.stats.cpu;
            document.getElementById('memVal').textContent = data.stats.memory;
        }
    });

    function updateAgentList(agents) {
      agentSelect.innerHTML = '';
      agents.forEach(([id, name]) => {
        const option = document.createElement('option');
        option.value = id;
        option.textContent = name;
        agentSelect.appendChild(option);
      });
    }

    socket.on('agent_list', updateAgentList);

    touchpad.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const x = Math.floor(touch.clientX * 2); 
      const y = Math.floor(touch.clientY * 2);
      sendAction({ type: 'mouse', x: x, y: y });
    });

    function authenticate() {
      const pin = document.getElementById('pin').value;
      socket.emit('auth', { pin });
    }

    socket.on('auth_result', (data) => {
      if (data.success) {
        document.getElementById('controls').style.display = 'block';
        updateAgentList(data.agents);
        alert('Authenticated!');
      } else {
        alert('Authentication failed: ' + data.message);
      }
    });

    function sendAction(action) {
      if (isRecording) {
        currentMacro.push(action);
      } else {
        action.targetId = agentSelect.value;
        socket.emit('action', action);
      }
    }
  </script>
</body>
</html>
